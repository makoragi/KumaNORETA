name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/configure-pages@v5
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          VITE_GTFS_RT_TRIP_UPDATES_URL: ${{ vars.VITE_GTFS_RT_TRIP_UPDATES_URL || 'https://km.bus-vision.jp/realtime/toshibus_trip_update.bin' }}
          VITE_GTFS_RT_ALERTS_URL: ${{ vars.VITE_GTFS_RT_ALERTS_URL || 'https://km.bus-vision.jp/realtime/toshibus_alrt_update.bin' }}
          VITE_GTFS_RT_PROXY_URL: ${{ vars.VITE_GTFS_RT_PROXY_URL }}
          VITE_GTFS_RT_USE_MOCK: ${{ vars.VITE_GTFS_RT_USE_MOCK || 'false' }}
          VITE_GTFS_RT_API_KEY: ${{ vars.VITE_GTFS_RT_API_KEY }}
          VITE_GTFS_RT_API_KEY_HEADER: ${{ vars.VITE_GTFS_RT_API_KEY_HEADER || 'x-api-key' }}
          VITE_GTFS_RT_AUTH_TOKEN: ${{ vars.VITE_GTFS_RT_AUTH_TOKEN }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
